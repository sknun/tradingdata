syntax = "proto3";
package grpcproto_service;
import "google/protobuf/empty.proto";
option go_package = "./;grpcproto"; 

// 推送服务
service Service {
    rpc PushData (stream Request) returns (google.protobuf.Empty);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}

// K线
message Kline {
    string plat                 = 1; // 交易产品平台代码
    string code                 = 2; // 交易产品代码
    double real_price           = 3; // 真实价格
    double ctrl_price           = 4; // 控盘价格
    double total_offset         = 5; // 总偏移量
    double cur_offset           = 6; // 当前偏移量
    repeated KlineData data = 7; // 不同周期k线 1m 5m 15m 30m 1h 4h D W M
    int64 rdtime = 8;
	int64 sdtime = 9;
	int64 rstime = 10;
	int64 sstime = 11;
    int64 wctime = 12;
}

message KlineData {
    string interval = 1; // 周期
    int64  time     = 2; // K线时间
    double open     = 3;
    double close    = 4;
    double high     = 5;
    double low      = 6;
    double volume   = 7;
    double turnover = 8;
}

// 盘口

message OrderBookLevel {
    double price  = 1;
    double volume = 2;
}

message OrderBook {
    string plat = 1;
    string code = 2;
    int64  time = 3; // 毫秒
    repeated OrderBookLevel bids = 4;
    repeated OrderBookLevel asks = 5;
    int64 rdtime = 6;
	int64 sdtime = 7;
	int64 rstime = 8;
	int64 sstime = 9;
    int64 wctime = 10;
}

// 下发请求
message Request {
    oneof payload {
        Kline     kline     = 1;
        OrderBook ob        = 2;
    }
}

message HeartbeatRequest {
    int64 client_time = 1; // 客户端发起时间戳 秒单位
}

message HeartbeatResponse {
    int64 server_time = 1; // 服务端应答时间戳 秒单位
}

// protoc --go_out=. --go-grpc_out=. grpc.proto